$kind: http-request
name: Create Customer
method: POST
url: '{{baseUrl}}/api/v1/customer'
order: 3000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "type": "individual",
      "name": "John Doe",
      "email": "john.doe@example.com",
      "address": "123 Main St",
      "city": "New York",
      "state": "NY",
      "postal_code": "10001"
    }
