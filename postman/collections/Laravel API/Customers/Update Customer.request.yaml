$kind: http-request
name: Update Customer
method: PUT
url: '{{baseUrl}}/api/v1/customer/:customer'
order: 4000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
pathVariables:
  - key: customer
    value: '{{customer_id}}'
    description: Customer ID
body:
  type: json
  content: |-
    {
      "type": "individual",
      "name": "John Doe Updated",
      "email": "john.updated@example.com",
      "address": "456 Oak Ave",
      "city": "Los Angeles",
      "state": "CA",
      "postal_code": "90001"
    }
