$kind: http-request
name: Create Invoice
method: POST
url: '{{baseUrl}}/api/v1/invoices'
order: 3000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "customer_id": 1,
      "amount": 150.00,
      "status": "pending",
      "billed_date": "2026-03-10",
      "paid_date": null
    }
